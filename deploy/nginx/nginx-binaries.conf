server {
    listen 8080;
    server_name _;

    # Serve LXC templates (existing)
    location /templates/ {
        alias /var/lib/packer-builds/lxc/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        client_max_body_size 500M;

        expires 1d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;

        location ~* \.(tar\.gz|tgz)$ {
            add_header Content-Type "application/gzip";
        }

        location ~* \.(tar\.zst)$ {
            add_header Content-Type "application/zstd";
        }

        location ~* \.(meta|json)$ {
            add_header Content-Type "application/json";
        }
    }

    # Serve binaries
    # URL pattern: /api/binaries/<project>/<arch>/<binary>
    # Example:     /api/binaries/journal/amd64/entry-ingest
    location /api/binaries/ {
        alias /var/lib/packer-builds/binaries/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        autoindex_format json;

        add_header Access-Control-Allow-Origin *;

        # No caching — always fetch latest
        expires off;
        add_header Cache-Control "no-store";

        # Serve binaries as octet-stream
        default_type application/octet-stream;
    }

    # LXC template listing (existing)
    location /api/templates {
        alias /var/lib/packer-builds/lxc/;
        autoindex on;
        autoindex_format json;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Root redirect
    location = / {
        return 301 /templates/;
    }
}
