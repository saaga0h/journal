# Production Mosquitto configuration
# Differences from mosquitto.conf (dev):
#   - anonymous access disabled
#   - password_file required
#
# Generate the password file on the Mosquitto host before applying this config:
#   mosquitto_passwd -c /mosquitto/config/passwd journal
# (Do NOT commit the passwd file to the repo.)

listener 1884
allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type all
