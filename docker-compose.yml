services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: journal_postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=journal
      - POSTGRES_USER=journal
      - POSTGRES_PASSWORD=journal
    volumes:
      - journal_postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/01-extensions.sql
    restart: unless-stopped
    networks:
      - journal_network

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: journal_mosquitto
    ports:
      - "1884:1883"
      - "9002:9001"
    volumes:
      - ./deploy/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped
    networks:
      - journal_network

  ollama:
    image: ollama/ollama:latest
    container_name: journal_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles: ["dev"]
    networks:
      - journal_network

volumes:
  journal_postgres_data:
    driver: local
  mosquitto_data:
    driver: local
  ollama_data:
    driver: local

networks:
  journal_network:
    driver: bridge
