<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal — Space Viz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: #ccc; font-family: monospace; overflow: hidden; }
    #scene { width: 100vw; height: 100vh; display: block; }

    #controls {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      background: rgba(10,10,15,0.85); border: 1px solid #333;
      padding: 12px 16px; border-radius: 6px; min-width: 220px;
    }
    #controls h3 { margin-bottom: 8px; color: #eee; font-size: 13px; }
    #controls label { display: block; margin: 6px 0 2px; font-size: 11px; color: #999; }
    #controls input[type=range] { width: 100%; }
    #controls button {
      margin-top: 8px; padding: 4px 10px; background: #222; color: #ccc;
      border: 1px solid #555; border-radius: 3px; cursor: pointer; font-family: monospace;
    }
    #controls button:hover { background: #333; }
    #controls .value { float: right; color: #eee; }
    #controls .separator { border-top: 1px solid #333; margin: 8px 0; }
    #controls select {
      margin-top: 6px; width: 100%; background: #181820; color: #ccc;
      border: 1px solid #555; border-radius: 3px; padding: 3px 6px;
      font-family: monospace; font-size: 11px; cursor: pointer;
    }

    #tab-bar { display: flex; gap: 0; margin-bottom: 10px; }
    #tab-bar button {
      flex: 1; padding: 5px 0; background: transparent; color: #666;
      border: none; border-bottom: 2px solid transparent;
      font-family: monospace; font-size: 12px; cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #tab-bar button:hover { color: #aaa; }
    #tab-bar button.active { color: #eee; border-bottom-color: #4fc3f7; }

    #manifold-controls { margin-top: 4px; }
    #manifold-status {
      margin-top: 8px; font-size: 11px; color: #888; min-height: 14px;
    }

    #tooltip {
      position: fixed; z-index: 20; display: none;
      background: rgba(10,10,15,0.92); border: 1px solid #555;
      padding: 8px 12px; border-radius: 4px; font-size: 11px;
      pointer-events: none; max-width: 300px; line-height: 1.5;
    }
    #tooltip .source { color: #7af; }
    #tooltip .date   { color: #aaa; }
    #tooltip .concepts { color: #af7; margin-top: 4px; }

    #loading {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      z-index: 30; font-size: 14px; color: #666;
    }
  </style>
</head>
<body>
  <div id="loading">Loading entries...</div>

  <div id="controls">
    <div id="tab-bar">
      <button class="active" data-tab="space">Space</button>
      <button data-tab="manifold">Manifolds</button>
    </div>

    <div id="space-controls">
      <label>Days: <span class="value" id="days-value">90</span></label>
      <input type="range" id="days-slider" min="30" max="365" step="30" value="90">
      <div class="separator"></div>
      <button id="btn-recompute">Recompute UMAP</button>
      <div class="separator"></div>
      <button id="btn-color-toggle">Color: soul-speed</button>
      <div class="separator"></div>
      <label for="focus-select">Focus doc:</label>
      <select id="focus-select">
        <option value="">— none —</option>
      </select>
    </div>

    <div id="manifold-controls" style="display:none">
      <label>Days: <span class="value" id="mf-days-value">90</span></label>
      <input type="range" id="mf-days-slider" min="30" max="365" step="30" value="90">
      <div class="separator"></div>
      <label for="manifold-select">Standing doc:</label>
      <select id="manifold-select">
        <option value="">— select —</option>
      </select>
      <button id="btn-compute-manifold">Compute</button>
      <div id="manifold-status"></div>
    </div>
  </div>

  <div id="tooltip">
    <div class="source"></div>
    <div class="date"></div>
    <div class="concepts"></div>
  </div>

  <canvas id="scene"></canvas>

  <script src="three.min.js"></script>
  <script src="OrbitControls.js"></script>
  <script src="ConvexGeometry.js"></script>
  <script src="umap.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
