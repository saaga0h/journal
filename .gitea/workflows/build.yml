# Build and publish all Journal binaries on every push to main.
# Binaries are copied directly to the nginx artifact server on the packer host.
# Served at: packer server
#
# Prerequisites:
#   - Runner "packer" is the same host as the nginx artifact server
#   - /var/lib/packer-builds/binaries/journal/{amd64,arm64}/ directories exist
#     and are writable by the act_runner user

name: build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: packer

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build amd64 binaries
        run: |
          mkdir -p build/amd64
          GOOS=linux GOARCH=amd64 make build-primitives BUILD_DIR=./build/amd64

      - name: Build arm64 binaries
        run: |
          mkdir -p build/arm64
          GOOS=linux GOARCH=arm64 make build-primitives BUILD_DIR=./build/arm64

      - name: Publish binaries
        run: |
          mkdir -p /var/lib/packer-builds/binaries/journal/amd64
          mkdir -p /var/lib/packer-builds/binaries/journal/arm64
          cp -f build/amd64/* /var/lib/packer-builds/binaries/journal/amd64/
          cp -f build/arm64/* /var/lib/packer-builds/binaries/journal/arm64/
          echo "Published:"
          ls -lh /var/lib/packer-builds/binaries/journal/amd64/
      
      - name: Debug vars
        env:
          ARTIFACT_BASE: ${{ vars.ARTIFACT_BASE }}
        run: |
          echo "ARTIFACT_BASE length: ${#ARTIFACT_BASE}"
          envsubst < deploy/nomad/journal-daemons.hcl | grep artifact_base
      
      - name: Deploy Nomad jobs
        env:
          NOMAD_ADDR: ${{ vars.NOMAD_ADDR }}
          ARTIFACT_BASE: ${{ vars.ARTIFACT_BASE }}
        run: |
          for hcl in deploy/nomad/*.hcl; do
            envsubst < "$hcl" | nomad job run -
          done