# Build and publish all Journal binaries on every push to main.
# Binaries are uploaded to a fixed "latest" release, overwriting previous ones.
#
# Prerequisites:
#   - JOURNAL_RELEASE_TOKEN secret set in repo settings (repository read+write)
#   - Self-hosted runner "packer" registered in Gitea with Go and make available

name: build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: packer

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build all binaries
        run: make build-primitives

      - name: Ensure latest release exists
        run: |
          curl -fsSL -X POST \
            -H "Authorization: token ${{ secrets.JOURNAL_RELEASE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"tag_name":"latest","name":"latest","body":"Latest build from main"}' \
            "https://git.home.federation.fi/api/v1/repos/${{ github.repository }}/releases" \
          || true

      - name: Delete existing assets
        run: |
          release_id=$(curl -sSL \
            -H "Authorization: token ${{ secrets.JOURNAL_RELEASE_TOKEN }}" \
            "https://git.home.federation.fi/api/v1/repos/${{ github.repository }}/releases/tags/latest" \
            | grep -o '"id":[0-9]*' | head -1 | grep -o '[0-9]*')
          echo "Release ID: ${release_id}"
          assets=$(curl -sSL \
            -H "Authorization: token ${{ secrets.JOURNAL_RELEASE_TOKEN }}" \
            "https://git.home.federation.fi/api/v1/repos/${{ github.repository }}/releases/${release_id}/assets" \
            | grep -o '"id":[0-9]*' | grep -o '[0-9]*')
          for id in $assets; do
            echo "Deleting asset ${id}..."
            curl -sSL -X DELETE \
              -H "Authorization: token ${{ secrets.JOURNAL_RELEASE_TOKEN }}" \
              "https://git.home.federation.fi/api/v1/repos/${{ github.repository }}/releases/assets/${id}" \
            || true
          done

      - name: Upload binaries
        run: |
          for binary in build/*; do
            echo "Uploading ${binary}..."
            curl -fsSL -X POST \
              -H "Authorization: token ${{ secrets.JOURNAL_RELEASE_TOKEN }}" \
              -F "attachment=@${binary}" \
              "https://git.home.federation.fi/api/v1/repos/${{ github.repository }}/releases/tags/latest/assets"
          done
