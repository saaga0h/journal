name: space-viz

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: docker-runner

    steps:
    - name: Checkout code
      uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744

    - name: Generate version
      id: version
      run: echo "version=v$(date +%Y%m%d)-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

    - name: Set up Go
      uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4
      with:
        go-version: '1.22'

    - name: Build binary
      run: |
        mkdir -p build/amd64
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o build/amd64/space-viz ./cmd/space-viz
        ls -lh build/amd64/
        file build/amd64/space-viz

    - name: Login to Harbor
      env:
        REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      run: |
        echo "$REGISTRY_PASSWORD" | \
          docker login harbor.home.federation.fi \
          -u "$REGISTRY_USERNAME" \
          --password-stdin

    - name: Build and push Docker image
      run: |
        docker build \
          -t ${{ secrets.REGISTRY_URL }}/space-viz:${{ steps.version.outputs.version }} \
          -t ${{ secrets.REGISTRY_URL }}/space-viz:latest \
          -f cmd/space-viz/Dockerfile \
          build/amd64
        docker push ${{ secrets.REGISTRY_URL }}/space-viz:${{ steps.version.outputs.version }}
        docker push ${{ secrets.REGISTRY_URL }}/space-viz:latest

    - name: Deploy to production
      env:
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
        IMAGE_TAG: ${{ steps.version.outputs.version }}
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_PORT: ${{ secrets.DB_PORT }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ secrets.DB_NAME }}
        DB_SSLMODE: ${{ secrets.DB_SSLMODE }}
        OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
        OLLAMA_EMBED_MODEL: ${{ secrets.OLLAMA_EMBED_MODEL }}
      run: |
        mkdir -p ~/.ssh
        echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null

        # Write .env file using printf %s — prevents shell from interpreting special chars
        printf "DB_HOST='%s'\nDB_PORT='%s'\nDB_USER='%s'\nDB_PASSWORD='%s'\nDB_NAME='%s'\nDB_SSLMODE='%s'\nOLLAMA_BASE_URL='%s'\nOLLAMA_EMBED_MODEL='%s'\n" \
          "$DB_HOST" "$DB_PORT" "$DB_USER" "$DB_PASSWORD" "$DB_NAME" "$DB_SSLMODE" "$OLLAMA_BASE_URL" "$OLLAMA_EMBED_MODEL" > .env

        # Write compose file — no heredoc to avoid YAML indentation issues
        printf 'services:\n  space-viz:\n    image: %s/space-viz:%s\n    container_name: space-viz\n    env_file: .env\n    ports:\n      - "8687:8687"\n    restart: unless-stopped\n    healthcheck:\n      test: ["CMD", "curl", "-f", "http://localhost:8687/health"]\n      interval: 30s\n      timeout: 5s\n      retries: 3\n    logging:\n      driver: "json-file"\n      options:\n        max-size: "10m"\n        max-file: "3"\n' \
          "$REGISTRY_URL" "$IMAGE_TAG" > docker-compose.yml

        # Copy both files to deploy host and run
        scp -i ~/.ssh/deploy_key .env docker-compose.yml $DEPLOY_USER@$DEPLOY_HOST:/opt/docker-compose/production/space-viz/
        ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST \
          "mkdir -p /opt/docker-compose/production/space-viz && \
           cd /opt/docker-compose/production/space-viz && \
           docker compose pull && \
           docker compose up -d && \
           docker image prune -f && \
           echo 'space-viz deployed'"

        rm -f ~/.ssh/deploy_key .env docker-compose.yml
