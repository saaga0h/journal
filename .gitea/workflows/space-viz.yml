name: space-viz

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: packer

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Generate version
      id: version
      run: echo "version=v$(date +%Y%m%d)-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

    - name: Build binary
      run: |
        mkdir -p build/amd64
        GOOS=linux GOARCH=amd64 go build -o build/amd64/space-viz ./cmd/space-viz

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: build/amd64
        dockerfile: cmd/space-viz/Dockerfile
        push: true
        tags: |
          ${{ secrets.REGISTRY_URL }}/space-viz:${{ steps.version.outputs.version }}
          ${{ secrets.REGISTRY_URL }}/space-viz:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to production
      env:
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
        IMAGE_TAG: ${{ steps.version.outputs.version }}
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_PORT: ${{ secrets.DB_PORT }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ secrets.DB_NAME }}
        DB_SSLMODE: ${{ secrets.DB_SSLMODE }}
        OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
        OLLAMA_EMBED_MODEL: ${{ secrets.OLLAMA_EMBED_MODEL }}
      run: |
        mkdir -p ~/.ssh
        echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null

        cat > deploy.sh << 'SCRIPT'
        #!/bin/bash
        set -e

        mkdir -p /opt/docker-compose/production/space-viz
        cd /opt/docker-compose/production/space-viz

        cat > docker-compose.yml << EOF
        services:
          space-viz:
            image: ${REGISTRY_URL}/space-viz:${IMAGE_TAG}
            container_name: space-viz
            environment:
              - DB_HOST=${DB_HOST}
              - DB_PORT=${DB_PORT}
              - DB_USER=${DB_USER}
              - DB_PASSWORD=${DB_PASSWORD}
              - DB_NAME=${DB_NAME}
              - DB_SSLMODE=${DB_SSLMODE}
              - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
              - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL}
            ports:
              - "8687:8687"
            restart: unless-stopped
            healthcheck:
              test: ["CMD", "curl", "-f", "http://localhost:8687/health"]
              interval: 30s
              timeout: 5s
              retries: 3
            logging:
              driver: "json-file"
              options:
                max-size: "10m"
                max-file: "3"
        EOF

        docker compose pull
        docker compose up -d
        docker image prune -f
        echo "space-viz deployed"
        SCRIPT

        export IMAGE_TAG REGISTRY_URL DB_HOST DB_PORT DB_USER DB_PASSWORD DB_NAME DB_SSLMODE OLLAMA_BASE_URL OLLAMA_EMBED_MODEL

        scp -i ~/.ssh/deploy_key deploy.sh $DEPLOY_USER@$DEPLOY_HOST:/tmp/
        ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST \
          "export IMAGE_TAG='${IMAGE_TAG}' REGISTRY_URL='${REGISTRY_URL}' \
           DB_HOST='${DB_HOST}' DB_PORT='${DB_PORT}' DB_USER='${DB_USER}' \
           DB_PASSWORD='${DB_PASSWORD}' DB_NAME='${DB_NAME}' DB_SSLMODE='${DB_SSLMODE}' \
           OLLAMA_BASE_URL='${OLLAMA_BASE_URL}' OLLAMA_EMBED_MODEL='${OLLAMA_EMBED_MODEL}' && \
           bash /tmp/deploy.sh && rm /tmp/deploy.sh"

        rm -f ~/.ssh/deploy_key deploy.sh
