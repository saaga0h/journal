# Deploy Journal Nomad jobs after a successful build.
# Checks out the repo to access HCL job files, then submits them to Nomad.
#
# Prerequisites:
#   - Nomad binary installed on packer host
#   - NOMAD_ADDR set (or use the env var below)
#   - Vault already configured on the Nomad server with the journal policy

name: deploy

on:
  workflow_run:
    workflows: ["build"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: packer
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy Nomad jobs
        env:
          NOMAD_ADDR: http://192.168.10.42:4646
        run: |
          nomad job run deploy/nomad/journal-daemons.hcl
          nomad job run deploy/nomad/journal-ingest-standing.hcl
          nomad job run deploy/nomad/journal-ingest-entries.hcl
          nomad job run deploy/nomad/journal-trend-detect.hcl
          nomad job run deploy/nomad/journal-brief-trigger.hcl
